[build]
  command = "npm run build"
  publish = ".next"
  environment = { SECRETS_SCAN_OMIT_PATHS = ".env.local,.netlify/functions-internal/___netlify-server-handler/.env.local" }

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Increase timeout for the AI image-generation route (Pollinations can take 20-30s).
[functions."___netlify-server-handler"]
  timeout = 60

