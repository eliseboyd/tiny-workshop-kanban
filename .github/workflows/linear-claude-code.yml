name: Linear → Claude Code

on:
  repository_dispatch:
    types: [linear-issue-ready]

jobs:
  implement:
    name: Implement ${{ github.event.client_payload.issue_id }}
    runs-on: ubuntu-latest
    # Give the job enough time for Claude to work through non-trivial issues.
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT so the GITHUB_TOKEN-gated push and gh PR create work.
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # ── 2. Set up Node (matches CI workflow) ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Install project dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install Claude Code CLI ───────────────────────────────────────────
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # ── 5. Create a branch for this issue ────────────────────────────────────
      - name: Create branch
        id: branch
        env:
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
        run: |
          # Sanitise the issue ID for use as a branch name component.
          SAFE_ID=$(echo "$ISSUE_ID" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          BRANCH="linear/${SAFE_ID}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 6. Plan: Claude writes an implementation plan ────────────────────────
      - name: Generate plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
          ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
          ISSUE_DESCRIPTION: ${{ github.event.client_payload.issue_description }}
          ISSUE_URL: ${{ github.event.client_payload.issue_url }}
          CLAUDE_NO_TTY: "1"
        run: |
          mkdir -p docs/plans
          cat << CLAUDE_EOF | claude --print --allowedTools "Bash,Read,Glob,Grep,Write"
          You are planning the implementation of a Linear issue in the tiny-workshop-kanban repository.

          Issue: ${ISSUE_ID} - ${ISSUE_TITLE}
          Linear URL: ${ISSUE_URL}

          Description:
          ${ISSUE_DESCRIPTION}

          Instructions:
          1. Read CLAUDE.md for project conventions.
          2. Explore the codebase to understand what files will need to change.
          3. Write a concise implementation plan to docs/plans/${ISSUE_ID}.md using this structure:

          # Plan: ${ISSUE_ID} - ${ISSUE_TITLE}

          ## Understanding
          <1-3 sentences summarising what the issue is asking for>

          ## Approach
          <the implementation strategy you will follow>

          ## Files to change
          List each file and what changes are needed.

          ## Files to create
          List each new file and its purpose.

          ## Open questions
          <anything ambiguous in the issue that a reviewer should clarify>

          4. Stage the plan file with: git add docs/plans/${ISSUE_ID}.md
          5. Do NOT modify any other files and do NOT commit.
          CLAUDE_EOF

      # ── 7. Commit plan ───────────────────────────────────────────────────────
      - name: Commit plan
        env:
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
        run: |
          git config user.name  "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No plan file staged."
            exit 1
          fi

          git commit -m "plan(${ISSUE_ID}): add implementation plan"

      # ── 8. Implement: Claude writes code based on the plan ───────────────────
      - name: Implement
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
          ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
          ISSUE_DESCRIPTION: ${{ github.event.client_payload.issue_description }}
          ISSUE_URL: ${{ github.event.client_payload.issue_url }}
          CLAUDE_NO_TTY: "1"
        run: |
          cat << CLAUDE_EOF | claude --print --allowedTools "Bash,Read,Write,Edit,Glob,Grep"
          You are implementing a Linear issue in the tiny-workshop-kanban repository.

          Issue: ${ISSUE_ID} - ${ISSUE_TITLE}
          Linear URL: ${ISSUE_URL}

          Description:
          ${ISSUE_DESCRIPTION}

          Instructions:
          1. Read CLAUDE.md for project conventions.
          2. Read docs/plans/${ISSUE_ID}.md - this is your implementation plan. Follow it.
          3. Implement the issue as described in the plan.
          4. Make sure TypeScript types are satisfied (run: npx tsc --noEmit).
          5. Make sure lint passes (run: npm run lint).
          6. Stage all changed files with git add (do NOT re-stage the plan file).
          7. Do NOT commit - the next step will handle that.
          CLAUDE_EOF

      # ── 9. Commit implementation ─────────────────────────────────────────────
      - name: Commit implementation
        env:
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
          ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
        run: |
          if git diff --cached --quiet; then
            echo "::warning::Claude made no code changes. The plan file will still be pushed and a PR opened for review."
            exit 0
          fi

          git commit -m "feat(${ISSUE_ID}): ${ISSUE_TITLE}

          Implemented by Claude Code.
          Linear: ${{ github.event.client_payload.issue_url }}"

      # ── 10. Push branch ──────────────────────────────────────────────────────
      - name: Push branch
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: git push origin "$BRANCH"

      # ── 11. Open PR ──────────────────────────────────────────────────────────
      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ steps.branch.outputs.name }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
          ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
          ISSUE_URL: ${{ github.event.client_payload.issue_url }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "${ISSUE_ID}: ${ISSUE_TITLE}" \
            --body "## Summary

          Automated implementation of Linear issue **[${ISSUE_ID}](${ISSUE_URL})**.

          > ${ISSUE_TITLE}

          This PR was created autonomously by Claude Code after the issue moved to *Ready for Dev* in Linear.

          ## Review
          - Read \`docs/plans/${ISSUE_ID}.md\` for Claude's implementation plan and open questions
          - Review the code changes against the plan

          ## Checklist
          - [ ] Plan looks reasonable (see \`docs/plans/${ISSUE_ID}.md\`)
          - [ ] Implementation matches the plan
          - [ ] Lint and type-check pass (CI verifies automatically)
          - [ ] Merge when satisfied"
